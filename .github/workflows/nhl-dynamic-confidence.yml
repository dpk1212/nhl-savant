name: 🏒 NHL Dynamic Confidence Update

on:
  workflow_dispatch:
    inputs:
      run_backtest:
        description: 'Run backtest after update'
        required: false
        default: 'true'
        type: boolean
  schedule:
    # Run daily at 6 AM ET (11 AM UTC) after games are graded
    - cron: '0 11 * * *'

permissions:
  contents: write

jobs:
  update-nhl-confidence:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📚 Install dependencies
        run: npm ci
      
      - name: 🔐 Setup environment
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
      
      - name: 🎯 Update NHL Dynamic Confidence Weights
        run: npm run update-nhl-dynamic-confidence
      
      - name: 📊 Run Backtest (Optional)
        if: ${{ github.event.inputs.run_backtest == 'true' || github.event_name == 'schedule' }}
        run: npm run backtest-nhl-units
      
      - name: 📤 Commit and Push Weights
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/nhl_confidence_weights.json
          git diff --staged --quiet || (
            git commit -m "Update NHL confidence weights $(date +%Y-%m-%d)" &&
            git stash --include-untracked &&
            git pull --rebase -X theirs &&
            git stash pop || true &&
            for i in 1 2 3; do
              git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
              git pull --rebase -X theirs
            done
          )

