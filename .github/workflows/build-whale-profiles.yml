name: Build Whale Profiles

on:
  schedule:
    # 6 AM and 11 PM ET (11, 3 UTC)
    - cron: '0 3,11 * * *'
  workflow_dispatch:

jobs:
  build-profiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build whale profiles
        run: node scripts/buildWhaleProfiles.js

      - name: Commit if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/whale_profiles.json
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-update: Whale profiles [$(date +'%Y-%m-%d %H:%M')]" &&
            git pull --rebase -X theirs || (git add -A && git rebase --continue) &&
            git push
          )
