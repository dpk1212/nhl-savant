name: Refresh Twitter Analysis

# Pulls the live @Real_NHL_Savant timeline via Firecrawl and commits a fresh
# snapshot to social_analysis/my_tweets.json. The Cursor "Social Loop"
# automation reads that committed file, so this keeps its voice/performance
# data current without needing the Firecrawl key in the Cursor environment.
#
# Runs twice per week (Mon & Thu, 9:00 AM ET) + manual dispatch.

on:
  schedule:
    - cron: '0 13 * * 1,4'
  workflow_dispatch:

concurrency:
  group: refresh-twitter-analysis
  cancel-in-progress: false

jobs:
  refresh-twitter-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}" >> .env

      - name: Pull + process timeline
        run: node scripts/analyzeMyTweets.mjs

      - name: Commit refreshed analysis if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add social_analysis/my_tweets.json
          if git diff --staged --quiet; then
            echo "No timeline changes this run."
          else
            git commit -m "Auto-update: Twitter analysis snapshot [$(date +'%Y-%m-%d %H:%M')]"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
            done
          fi
