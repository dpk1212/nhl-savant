name: Wallet Consensus Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: false
        default: '2026-04-18'
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: false
        default: '2026-12-31'

jobs:
  backtest:
    name: Backtest V8 picks vs. wallet-consensus Δ
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backtest
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "  WALLET CONSENSUS BACKTEST — V8 PICKS vs. Δ"
          echo "  Window: ${{ github.event.inputs.start_date }} → ${{ github.event.inputs.end_date }}"
          echo "  Time:   $(TZ='America/New_York' date '+%Y-%m-%d %I:%M %p ET')"
          echo "════════════════════════════════════════════════════════════════"
          node scripts/walletConsensusBacktest.js "${{ github.event.inputs.start_date }}" "${{ github.event.inputs.end_date }}" --md | tee wallet-consensus-backtest.txt

      - name: Upload backtest artifact
        uses: actions/upload-artifact@v4
        with:
          name: wallet-consensus-backtest
          path: |
            wallet-consensus-backtest.txt
            WALLET_CONSENSUS_BACKTEST.md
          retention-days: 30

      - name: Write to job summary
        run: |
          {
            echo "## Wallet Consensus Backtest"
            echo ""
            echo '```'
            cat wallet-consensus-backtest.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
