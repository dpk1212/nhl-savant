name: Enrich Gap Wallets

on:
  schedule:
    # Every 2 hours (on the hour, offset by 45 min to avoid colliding with other workflows)
    - cron: '45 */2 * * *'
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Enrich gap wallets
        run: node scripts/enrichGapWallets.js

      - name: Commit if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/sports_sharps.json
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-enrich: Gap wallets [$(date +'%Y-%m-%d %H:%M')]" &&
            git stash --include-untracked &&
            git pull --rebase -X theirs &&
            git stash pop || true &&
            for i in 1 2 3; do
              git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
              git pull --rebase -X theirs
            done
          )
