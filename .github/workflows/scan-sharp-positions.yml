name: Scan Sharp Positions

on:
  schedule:
    - cron: '15 */2 * * *'
  workflow_dispatch:

jobs:
  scan-positions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan sharp wallet positions
        run: node scripts/scanSharpPositions.js

      - name: Commit if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/sharp_positions.json public/sharp_spread_positions.json public/sharp_total_positions.json public/sharp_intel_excluded_wallets.json
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-update: Sharp positions [$(date +'%Y-%m-%d %H:%M')]" &&
            git stash --include-untracked &&
            git pull --rebase -X theirs &&
            git stash pop || true &&
            for i in 1 2 3; do
              git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
              git pull --rebase -X theirs
            done
          )
