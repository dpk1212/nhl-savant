name: AGS-Unified Daily Report

# Single canonical monitoring artifact for the AGS-U pipeline.
# Replaces the v6/v7/v8 dailies as the source of truth for sharp-intel
# performance, calibration, and operational health.
#
# The underlying script (`scripts/dailyAgsUReport.js`) imports BOTH model
# surfaces (v11 logistic regression: AGS_FEATURES / AGS_WEIGHTS /
# AGS_FALLBACK_CALIBRATION, and v12 wallet-quality: AGS_V12_FALLBACK_
# CALIBRATION / agsV12TierFromValue / agsV12SizeMultiplier) at runtime
# from `src/lib/ags.js`. When either model is bumped (v9 → v10 → v11 →
# v12 → …) the report auto-tracks the new structure — no edits here needed.
#
# v12 PARALLEL SECTIONS rendered in addition to v11 (see scripts/
# dailyAgsUReport.js header for the full list): §1b/§2b/§5b mirror the
# v11 calibration sections for v12; §13 is a head-to-head and §14 audits
# the v12 wallet-quality distribution.
#
# Schedule: 8:30am ET every day (12:30 UTC). Tunable below.
# Manual: trigger from the Actions tab "Run workflow" button — useful
# when you want a fresh report after a hot-fix or before a slate.

on:
  workflow_dispatch:  # manual trigger ("Run workflow" button)
  schedule:
    - cron: '30 12 * * *'  # 8:30 AM ET (12:30 UTC) daily

permissions:
  contents: write  # needs write so the report commit can land

jobs:
  report:
    name: Generate AGS-U Daily Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate AGS-U report
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "  AGS-UNIFIED DAILY REPORT"
          echo "  Time: $(TZ='America/New_York' date '+%Y-%m-%d %I:%M %p ET')"
          echo "════════════════════════════════════════════════════════════════"
          node scripts/dailyAgsUReport.js

      - name: Commit report
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add DAILY_AGSU_REPORT.md
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-update: AGS-U Daily Report [$(TZ='America/New_York' date +'%Y-%m-%d')]" &&
            git stash --include-untracked &&
            git pull --rebase origin main &&
            git stash pop || true &&
            for i in 1 2 3; do
              git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
              git pull --rebase origin main
            done
          )
