name: Write Sharp Actions to Firebase

# Cadence note (2026-05-01): tightened from every 2h to hourly so Firestore-
# stamped vault_hc* fields stay close to live JSON refreshes (~8 min cycle on
# fetch-polymarket). The Sharp Vault UI computes HC margin client-side from
# JSON for sub-cycle freshness; this job persists the same fields to
# Firestore for analytics + downstream reports (daily V6 report, backfills).
on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  write-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write sharp actions to Firebase
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node scripts/writeSharpActions.js
