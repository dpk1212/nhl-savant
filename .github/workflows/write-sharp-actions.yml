name: Write Sharp Actions to Firebase

# Cadence note (2026-05-02): standalone cron disabled — writeSharpActions
# now runs inside the fetch-polymarket inner loop (every ~8 min) right after
# scanSharpPositions and before syncPickStateAuthoritative, so Firestore
# positions stay in lock-step with live JSON refreshes. workflow_dispatch
# kept for manual/backfill invocation.
on:
  workflow_dispatch:

jobs:
  write-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write sharp actions to Firebase
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node scripts/writeSharpActions.js
