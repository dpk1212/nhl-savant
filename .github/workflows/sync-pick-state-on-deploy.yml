name: Sync Pick State (on deploy)

# ─── Why this workflow exists ──────────────────────────────────────────────
# fetch-polymarket.yml runs syncPickStateAuthoritative inline before each
# of its 6 deploys, but if the inline run fails (Firestore hiccup, network
# blip, partial throttle), the deploy still ships and the dashboard ends
# up serving fresh public/*.json against stale sharpFlowPicks/Spreads/Totals
# state. That's the exact source of "card says X, Firebase says Y"
# mismatches users see on the locked-picks list.
#
# This workflow fires on EVERY push to gh-pages — i.e. after every
# cycle's deploy succeeds — and re-runs syncPickStateAuthoritative as a
# safety net. It's idempotent: if the inline cron already wrote the
# canonical state, this run sees no changes and exits clean. If the
# inline run failed, this run catches it within ~30s of the deploy
# landing on the CDN.
#
# Combined with the inline run, this gives us two guaranteed shots at
# Firestore sync per cycle. The dashboard a user loads after a deploy
# is reading JSON + Firestore that were both authored by the same fetch
# cycle within the last ~minute.

on:
  push:
    branches:
      - gh-pages
  workflow_dispatch:

concurrency:
  group: sync-pick-state-on-deploy
  cancel-in-progress: false

jobs:
  sync-pick-state:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

    steps:
      # We need the script + script deps from main, NOT the gh-pages dist.
      # Explicit ref keeps us off the gh-pages branch that just triggered us.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync canonical pick state
        run: node scripts/syncPickStateAuthoritative.js
