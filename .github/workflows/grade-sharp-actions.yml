name: Grade Sharp Actions

on:
  schedule:
    - cron: '0 3,5,7,9 * * *'
  workflow_dispatch:

jobs:
  grade-actions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # TEMP investigation step (first WNBA slate) — remove after dump lands
      - name: Dump first WNBA slate (sharp_action_positions)
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          node scripts/_dumpWnbaSlate.mjs
          echo "===== DUMP JSON ====="
          cat data/wnba_first_slate_dump.json

      - name: Upload WNBA dump artifact
        uses: actions/upload-artifact@v4
        with:
          name: wnba-first-slate-dump
          path: data/wnba_first_slate_dump.json
          if-no-files-found: warn

      - name: Commit WNBA dump JSON
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          git add data/wnba_first_slate_dump.json
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Dump: first WNBA slate from sharp_action_positions" &&
            git pull --rebase -X theirs || true
            for i in 1 2 3; do
              git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
            done
          )

      - name: Grade sharp actions
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node scripts/gradeSharpActions.js

      - name: Sync wallet bets collection
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node scripts/syncWalletBets.js --write

      - name: Rebuild sharp wallet profiles
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node scripts/exportWalletProfiles.js --write-firebase

      - name: Commit updated wallet profile artifacts
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wallet-profiles.json WALLET_ROSTER.md WALLET_PROFILES_SUMMARY.md
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-update: Sharp wallet profiles [$(TZ='America/New_York' date +'%Y-%m-%d %H:%M')] [skip ci]" &&
            git stash --include-untracked &&
            git pull --rebase -X theirs &&
            (git stash pop || true) &&
            for i in 1 2 3; do
              git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
            done
          )
