name: Rank Today's Top Picks

# v7.3 — auto-refreshing top-picks ranker driven by HC margin first,
# then Σ (Δw + Δq), then Δw individually. Every hour at :30 past we:
#
#   1. Rebuild WIN_MATRIX.md + public/win_matrix.json — the full
#      (Δw × Δq) cross-tab artifact (still useful as a reference
#      surface; consumed by other tooling).
#   2. Run scripts/rankTopPicks.js — v7.3 ranker. Reads every
#      graded pick since v6 cutover, recomputes HC margin via a
#      point-in-time tier lens (so the entire ~200 pick sample is
#      usable, not just v7.1+ stamped ones), then ranks today's
#      LOCKED picks by composite signal score (HC margin dominates)
#      and surfaces the historical (Σ × HC_m) cell evidence for
#      every pick. Writes public/top_picks_ranked.json.
#   3. Commit artifacts to main and upload as a workflow artifact.
#
# Runs on :30. fetch-polymarket self-chains ~hourly chunks 6am–11pm ET
# (inner 4-min cycles); :30 still sits mid-chunk so rank sees several
# scan cycles of fresh sharpFlowPicks before locking.
on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

concurrency:
  group: rank-today-locks
  cancel-in-progress: false

jobs:
  rank:
    name: Rebuild win matrix + rank today's locked picks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      FIREBASE_CLIENT_EMAIL:    ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY:     ${{ secrets.FIREBASE_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild (Δw × Δq) win matrix (legacy reference artifact)
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "  WIN MATRIX — full (Δw × Δq) cross-tab"
          echo "  Time: $(TZ='America/New_York' date '+%Y-%m-%d %I:%M %p ET')"
          echo "════════════════════════════════════════════════════════════════"
          node scripts/winMatrix.js | tee win-matrix.log

      - name: Rank today's TOP PICKS (v7.3 — HC margin → Σ → Δw)
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "  TOP PICKS — v7.3 ranker (HC margin → Σ → Δw)"
          echo "  Time: $(TZ='America/New_York' date '+%Y-%m-%d %I:%M %p ET')"
          echo "════════════════════════════════════════════════════════════════"
          node scripts/rankTopPicks.js | tee top-picks-ranked.txt

      - name: Export today's LIVE board for social (same as site)
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "  TODAY'S PICKS — live board export for the social Content Brief"
          echo "════════════════════════════════════════════════════════════════"
          node scripts/exportTodaysPicks.mjs | tee todays-picks-export.txt || echo "export failed (non-fatal)"

      - name: Commit WIN_MATRIX.md + win_matrix.json + top_picks_ranked.json + todays_picks.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add WIN_MATRIX.md public/win_matrix.json public/top_picks_ranked.json social_analysis/todays_picks.json
          if git diff --staged --quiet; then
            echo "--- no artifact changes this run ---"
          else
            git commit -m "Auto-update: TOP_PICKS + WIN_MATRIX [$(date +'%Y-%m-%d %H:%M')]"
            for attempt in 1 2 3; do
              if git pull --rebase -X theirs origin main && git push origin main; then
                echo "--- main push succeeded (attempt $attempt) ---"
                break
              fi
              echo "--- main push attempt $attempt failed, retrying ---"
              sleep 2
            done
          fi

      - name: Upload ranking artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rank-top-picks-${{ github.run_id }}
          path: |
            top-picks-ranked.txt
            win-matrix.log
            WIN_MATRIX.md
            public/win_matrix.json
            public/top_picks_ranked.json
          retention-days: 14

      - name: Write to job summary
        run: |
          {
            echo "# Rank Today's Top Picks (v7.3)"
            echo ""
            echo "Generated $(TZ='America/New_York' date '+%Y-%m-%d %I:%M %p ET')"
            echo ""
            echo "## Top Picks — ranked by HC margin → Σ → Δw"
            echo ""
            echo "Composite signal score weights: HC_m ≥ +2 → +1500 · HC_m = +1 → +1000 · HC_m = 0 → 0 · HC_m ≤ -1 → -800 / -1500. Σ ≥ +7 → +600 · Σ ∈ {5,6} → +400 · Σ ∈ {3,4} → +200 · Σ ∈ {1,2} → +50. Δw ×30 third tie-break."
            echo ""
            echo "Cell-evidence columns are historical N · W-L · WR% · flat ROI% from the full v6+ graded sample (HC margin recomputed via point-in-time tier lens — sample size ≈ 200 vs ≈ 30 if we relied on frozen stamps alone)."
            echo ""
            echo '```'
            cat top-picks-ranked.txt
            echo '```'
            echo ""
            echo "## Full (Δw × Δq) win matrix (legacy reference)"
            echo ""
            echo "See [WIN_MATRIX.md](../../blob/main/WIN_MATRIX.md) for the full cross-tab."
            echo ""
            echo '```'
            tail -80 win-matrix.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
