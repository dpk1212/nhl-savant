name: Fetch Market Data (Polymarket + Kalshi)

# ─── Scheduling (Option A — self-chain, 2026-07-11) ────────────────────────
# GitHub Actions cron is unreliable at sub-15-min cadence (silently dropped).
# We keep ~4-min scans via an inner loop (~12 × 240s ≈ 48 min/run), then
# self-dispatch the next run so coverage is continuous without babysitting.
#
# Day window (America/New_York):
#   • Starter cron ~6am ET (10:00 UTC during EDT / 11:00 UTC during EST)
#   • Safety crons ~12pm + ~6pm ET in case the chain broke
#   • End-of-run: if still 5am–11pm ET and nothing is queued → `gh workflow run`
#   • After 11pm ET the chain stops until the next morning starter
#
# concurrency cancel-in-progress:false → queued safety/cron waits; no kill.
# Inner loop unchanged (2026-07-09): 12 × ~4 min, work ~150–180s/cycle.
#
# Odds API budget: ~12 cycles × ~17 waking hours ≈ ~200 cycles/day × ~1–2
# calls — still well under the 50K/mo quota.
on:
  schedule:
    # 6:00 AM ET  (EDT=10:00 UTC · EST=11:00 UTC — pinned to EDT summer)
    - cron: '0 10 * * *'
    # Safety restarts if self-chain died: 12:00 PM + 6:00 PM ET (EDT)
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-polymarket
  cancel-in-progress: false

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    permissions:
      contents: write
      actions: write   # required for end-of-run self-dispatch (gh workflow run)
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
      # Server-side Firestore admin creds — needed by writeSharpActions and
      # syncPickStateAuthoritative inside the cycle loop. Without these the
      # browser-driven pick health sync was the only path keeping picks
      # in lock-step with live wallet state, which broke any time nobody had
      # the dashboard open (root cause of 2026-05-01 stale-state audit).
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
      # OneSignal — paid-only T−15 lock alerts (sendLockAlerts.mjs)
      ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
      ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write build env
        run: |
          cat > .env <<EOF
          ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          EOF

      - name: Configure git identity
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      # ─── Fast-cycle loop: 12 iterations × ~4 min apart ───────────────────
      # Each iteration:
      #   1. fetch + snapshot + scanSharpPositions + updateClosingOdds
      #   2. commit public/*.json to main (if changed)
      #   3. npm run build
      #   4. force-push ./dist to the gh-pages branch
      #
      # Each cycle targets 240s start-to-start. Measured work is ~150–180s
      # (2026-07-09 logs: "Cycle 2 took 152s"); we sleep the remainder.
      # If a cycle overruns 240s, the next starts immediately (no pile-up).
      #
      # The shell-based gh-pages push mirrors what peaceiris/actions-gh-pages
      # does internally — we can't call that action inside a shell loop.
      - name: Fetch + deploy cycle loop (12× at 4-min cadence)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set +e
          target_interval=240
          cycles=12
          for i in $(seq 1 "$cycles"); do
            cycle_start=$(date +%s)
            echo ""
            echo "════════════════════════════════════════════════════════════"
            echo "### Cycle $i/${cycles} — $(date -u +%H:%M:%S) UTC"
            echo "════════════════════════════════════════════════════════════"

            echo "--- fetchPolymarketData ---"
            node scripts/fetchPolymarketData.js || echo "polymarket failed (cycle $i)"

            echo "--- fetchKalshiData ---"
            node scripts/fetchKalshiData.js || echo "kalshi failed (cycle $i)"

            echo "--- snapshotPinnacle ---"
            node scripts/snapshotPinnacle.js || echo "pinnacle failed (cycle $i)"

            echo "--- scanSharpPositions ---"
            node scripts/scanSharpPositions.js || echo "scan failed (cycle $i)"

            # ── Whitelist coverage layer (Phase 2: recover + merge) ──────────
            # scanWhitelistedWallets cross-references the live promotion
            # whitelist (sharpWalletProfiles) against what the main scanner
            # just produced, and supplementally polls Polymarket for every
            # promoted wallet that the main path missed. Recovered positions
            # are merged into sharp_positions*.json (atomic writes with
            # JSON-parse verify) so the downstream writeSharpActions →
            # sharp_action_positions pipeline picks them up unchanged. A
            # per-cycle audit lands at public/whitelist_scan_diagnostics.json.
            # Non-fatal: any failure here leaves the cycle exactly as the
            # main scanner left it. Adds ~60s/cycle.
            echo "--- scanWhitelistedWallets (Phase 2 recover + merge) ---"
            node scripts/scanWhitelistedWallets.js || echo "whitelist scan failed (cycle $i — non-fatal, main scan unaffected)"

            # ── Firestore-side pipeline ─────────────────────────────────────
            # writeSharpActions persists the just-scanned positions (with
            # vault_hc* fields) to sharp_action_positions. Then
            # syncPickStateAuthoritative recomputes every today's LOCKED/LEAN
            # pick's health/tier from those positions and writes the canonical
            # state to sharpFlowPicks/Spreads/Totals. This is the server-side
            # mirror of the browser's syncPickHealth — it runs whether or not
            # anyone has the dashboard open, so picks stay current with the
            # 4-min fetch cadence right up to T-15 freeze.
            echo "--- writeSharpActions ---"
            node scripts/writeSharpActions.js || echo "writeSharpActions failed (cycle $i)"

            # syncPickStateAuthoritative is the canonical Firestore writer
            # for v7.4 lockStage / health / dw / dq / HC margin. Failure here
            # leaves the dashboard rendering against stale Firestore (cards
            # show old WEAKENING/MUTED state vs JSON's new ACTIVE state).
            # If it fails inline, the sync-pick-state-on-deploy.yml workflow
            # fires on the gh-pages push at the bottom of this cycle and
            # re-runs it as a safety net within ~30s.
            echo "--- syncPickStateAuthoritative ---"
            if ! node scripts/syncPickStateAuthoritative.js; then
              echo "::warning::syncPickStateAuthoritative failed inline (cycle $i) — will retry via sync-pick-state-on-deploy workflow after gh-pages push"
            fi

            # Paid-only lock alerts: newly frozen LOCKED sides at T−15 →
            # OneSignal filter tag paid=true. Idempotent via lockAlertSentAt.
            echo "--- sendLockAlerts ---"
            if [ -n "${ONESIGNAL_REST_API_KEY:-}" ]; then
              node scripts/sendLockAlerts.mjs || echo "::warning::sendLockAlerts failed (cycle $i — non-fatal)"
            else
              echo "--- sendLockAlerts skipped (ONESIGNAL_REST_API_KEY not set) ---"
            fi

            echo "--- updateClosingOdds ---"
            node scripts/updateClosingOdds.js || echo "closingOdds failed (cycle $i)"

            echo "--- auditMarketData ---"
            node scripts/auditMarketData.js || true

            # Commit + push JSON changes to main (retry on conflict).
            # Include scan_heartbeat.json — leaving it unstaged used to make
            # `git pull --rebase` fail every cycle ("unstaged changes"), so the
            # market-data commit never reached origin/main and the hard-reset
            # below wiped the fresh scan before build/deploy (Vault stuck ~20h).
            git add public/polymarket_data.json public/kalshi_data.json \
                    public/pinnacle_history.json public/sharp_positions.json \
                    public/sharp_spread_positions.json public/sharp_total_positions.json \
                    public/sharp_intel_excluded_wallets.json \
                    public/whitelist_scan_diagnostics.json \
                    public/scan_heartbeat.json 2>/dev/null || true
            if ! git diff --staged --quiet; then
              git commit -m "Auto-update: Market data [$(date +'%Y-%m-%d %H:%M') cycle $i]"
              for attempt in 1 2 3; do
                if git pull --rebase --autostash -X theirs origin main && git push origin main; then
                  echo "--- main push succeeded (attempt $attempt) ---"
                  break
                fi
                echo "--- main push attempt $attempt failed, retrying ---"
                git status -sb || true
                sleep 2
              done
            else
              echo "--- no main-branch JSON changes this cycle ---"
            fi

            # Keep this cycle's market JSON across reset — if the push above
            # failed, origin/main is still stale and reset would otherwise
            # drop the fresh scan before we build/deploy to gh-pages.
            json_stash=$(mktemp -d)
            cp -f public/polymarket_data.json public/kalshi_data.json \
                  public/pinnacle_history.json public/sharp_positions.json \
                  public/sharp_spread_positions.json public/sharp_total_positions.json \
                  public/sharp_intel_excluded_wallets.json \
                  public/whitelist_scan_diagnostics.json \
                  public/scan_heartbeat.json \
                  "$json_stash/" 2>/dev/null || true

            # Pull latest main BEFORE building. This loop checks out once at
            # job start and runs ~12 cycles (~48 min). Without a mid-loop pull,
            # every gh-pages deploy rebuilds that stale checkout and silently
            # overwrites any UI/code deploys that landed on main after the job
            # started (card redesigns, vault fixes, etc.).
            echo "--- sync main before build ---"
            git fetch origin main
            git reset --hard origin/main
            cp -f "$json_stash"/* public/ 2>/dev/null || true
            rm -rf "$json_stash"

            # Build the site (~1 min). Wipe dist so a leftover dist/.git from
            # a prior cycle can't make `git checkout -b gh-pages` no-op and
            # falsely report a successful deploy of stale assets.
            echo "--- npm run build ---"
            rm -rf dist
            if npm run build; then
              # Force-push ./dist to gh-pages. This is the same thing
              # peaceiris/actions-gh-pages does — we just inline it so it
              # can run inside the loop.
              echo "--- deploying dist → gh-pages ---"
              deploy_ok=0
              (
                cd dist
                # CNAME is already copied by Vite from public/.
                rm -rf .git
                git init -q
                git checkout -b gh-pages
                git add -A
                git -c user.email=actions@github.com -c user.name="GitHub Actions" \
                    commit -q -m "Deploy cycle $i [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
                git push -qf "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" \
                    HEAD:gh-pages
              ) && { echo "--- gh-pages push succeeded ---"; deploy_ok=1; } \
                || echo "--- gh-pages push failed (cycle $i) ---"

              # POST-DEPLOY SYNC SAFETY NET — re-run syncPickStateAuthoritative
              # right after the deploy lands. The inline run earlier in this
              # cycle is the primary; this catches the case where it failed
              # (Firestore hiccup, transient throttle) so the dashboard the
              # user loads against the just-published JSON sees Firestore
              # state from the SAME cycle, not the previous one.
              # Idempotent — if the primary run already wrote the canonical
              # state, this run sees no changes and exits clean.
              if [ "$deploy_ok" -eq 1 ]; then
                echo "--- syncPickStateAuthoritative (post-deploy safety net) ---"
                if ! node scripts/syncPickStateAuthoritative.js; then
                  echo "::warning::syncPickStateAuthoritative POST-DEPLOY also failed (cycle $i) — Firestore may be stale relative to deployed JSON until next cycle"
                fi
                echo "--- sendLockAlerts (post-deploy) ---"
                if [ -n "${ONESIGNAL_REST_API_KEY:-}" ]; then
                  node scripts/sendLockAlerts.mjs || echo "::warning::sendLockAlerts post-deploy failed (cycle $i)"
                fi
              fi
            else
              echo "--- build failed (cycle $i), skipping deploy ---"
            fi

            cycle_elapsed=$(( $(date +%s) - cycle_start ))
            echo "### Cycle $i took ${cycle_elapsed}s (target ${target_interval}s start-to-start)"
            if [ "$i" -lt "$cycles" ]; then
              remain=$(( target_interval - cycle_elapsed ))
              if [ "$remain" -gt 0 ]; then
                echo "--- sleeping ${remain}s until next cycle ---"
                sleep "$remain"
              else
                echo "--- cycle overran target; running next cycle immediately ---"
              fi
            fi
          done
          set -e
          echo ""
          echo "### All ${cycles} cycles complete — $(date -u +%H:%M:%S) UTC"

      # Self-chain: keep a fetch running 5am–11pm ET without hourly cron babysitting.
      # Skips if another run is already queued (safety cron / prior dispatch).
      - name: Chain next fetch (5am–11pm ET)
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          hour=$(TZ=America/New_York date +%H)
          hour=$((10#$hour))
          et_now=$(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')
          echo "### ET now: ${et_now} (hour=${hour})"

          if [ "$hour" -lt 5 ] || [ "$hour" -ge 23 ]; then
            echo "### Outside 5am–11pm ET window — chain stops until morning starter cron"
            exit 0
          fi

          queued=$(gh run list \
            --workflow fetch-polymarket.yml \
            --repo "$GH_REPO" \
            --status queued \
            --limit 10 \
            --json databaseId \
            --jq 'length' 2>/dev/null || echo 0)
          queued=$((10#${queued:-0}))
          if [ "$queued" -gt 0 ]; then
            echo "### Chain skipped — ${queued} run(s) already queued (concurrency will drain)"
            exit 0
          fi

          echo "### Dispatching next fetch-polymarket run…"
          gh workflow run fetch-polymarket.yml --repo "$GH_REPO"
          echo "### Chained OK"