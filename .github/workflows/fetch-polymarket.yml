name: Fetch Polymarket Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch-polymarket:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Polymarket data
        run: node scripts/fetchPolymarketData.js

      - name: Commit polymarket_data.json if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/polymarket_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Polymarket data [$(date +'%Y-%m-%d %H:%M')]" && git push)
