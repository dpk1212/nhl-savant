name: Fetch Market Data (Polymarket + Kalshi)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Polymarket data
        run: node scripts/fetchPolymarketData.js

      - name: Fetch Kalshi data
        run: node scripts/fetchKalshiData.js

      - name: Commit market data if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/polymarket_data.json public/kalshi_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Market data [$(date +'%Y-%m-%d %H:%M')]" && git push)
