name: Fetch Market Data (Polymarket + Kalshi)

# ─── Scheduling note (2026-04-24) ──────────────────────────────────────────
# GitHub Actions cron is unreliable at sub-15-min cadence — runs are silently
# queued and dropped under load. Audit of `*/8 * * * *` on this repo showed
# actual schedule firings only every ~55-65 min (most runs in the UI were
# workflow_dispatch catch-ups).
#
# Fix: trigger once per hour on a reliable cadence and run the fast
# Firebase-writing scripts (fetch + snapshot + scanSharpPositions +
# updateClosingOdds) 6× internally with ~8-min spacing. Build + deploy
# run once at the end, after all data cycles.
#
# Effective cadence for Sharp Intel / SharpFlow picks: ~8 min.
# Odds API budget: ~180 calls/day at 6 cycles × 24 hours × ~1-2 calls/cycle,
# well under the 50K/mo doubled quota.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: fetch-polymarket
  cancel-in-progress: false

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    permissions:
      contents: write
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env

      # ─── Fast-cycle loop: 6 iterations × ~8 min apart ────────────────────
      # Each iteration runs the Firebase-writing scripts that drive Sharp
      # Intel. We do NOT commit/build/deploy inside the loop — that happens
      # once at the very end so we avoid 6 GH Pages deploys per hour.
      #
      # Iteration timing (minutes into the run):
      #   i=1 t≈0    i=2 t≈8    i=3 t≈16
      #   i=4 t≈24   i=5 t≈32   i=6 t≈40
      #
      # Remaining budget (~18 min) covers audit + commit + build + deploy.
      - name: Fetch cycle loop (6× at 8-min cadence)
        run: |
          set +e
          # Target cycle cadence = 480s (8 min). We measure elapsed time
          # per cycle and sleep only the remainder, so the start-to-start
          # gap is a true 8 min even when scripts run long.
          target_interval=480
          for i in 1 2 3 4 5 6; do
            cycle_start=$(date +%s)
            echo ""
            echo "════════════════════════════════════════════════════════════"
            echo "### Fetch cycle $i/6 — $(date -u +%H:%M:%S) UTC"
            echo "════════════════════════════════════════════════════════════"

            echo "--- fetchPolymarketData ---"
            node scripts/fetchPolymarketData.js || echo "polymarket failed (cycle $i)"

            echo "--- fetchKalshiData ---"
            node scripts/fetchKalshiData.js || echo "kalshi failed (cycle $i)"

            echo "--- snapshotPinnacle ---"
            node scripts/snapshotPinnacle.js || echo "pinnacle failed (cycle $i)"

            echo "--- scanSharpPositions ---"
            node scripts/scanSharpPositions.js || echo "scan failed (cycle $i)"

            echo "--- updateClosingOdds ---"
            node scripts/updateClosingOdds.js || echo "closingOdds failed (cycle $i)"

            cycle_elapsed=$(( $(date +%s) - cycle_start ))
            echo "### Cycle $i took ${cycle_elapsed}s"
            if [ "$i" -lt 6 ]; then
              remain=$(( target_interval - cycle_elapsed ))
              if [ "$remain" -gt 0 ]; then
                echo "--- sleeping ${remain}s until next cycle ---"
                sleep "$remain"
              else
                echo "--- cycle overran target; running next cycle immediately ---"
              fi
            fi
          done
          set -e
          echo ""
          echo "### All 6 fetch cycles complete — $(date -u +%H:%M:%S) UTC"

      - name: Audit market data (final)
        run: node scripts/auditMarketData.js || true

      - name: Commit market data if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/polymarket_data.json public/kalshi_data.json public/pinnacle_history.json public/sharp_positions.json public/sharp_spread_positions.json public/sharp_total_positions.json public/sharp_intel_excluded_wallets.json
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-update: Market data [$(date +'%Y-%m-%d %H:%M')]" &&
            git stash --include-untracked &&
            git pull --rebase -X theirs &&
            git stash pop || true &&
            for i in 1 2 3; do
              git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
              git pull --rebase -X theirs
            done
          )

      - name: Create env for build
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}" >> .env

      - name: Build site
        env:
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: nhlsavant.com
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
