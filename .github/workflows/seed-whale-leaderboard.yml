name: Seed Whale Leaderboard

on:
  schedule:
    # Every 3 hours to build expanded pool faster
    - cron: '30 */3 * * *'
  workflow_dispatch:

jobs:
  seed-profiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed leaderboard profiles
        run: node scripts/buildWhaleProfiles.js --seed

      - name: Commit if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/whale_profiles.json
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-seed: Whale leaderboard profiles [$(date +'%Y-%m-%d %H:%M')]" &&
            git pull --rebase -X theirs || (git add -A && git rebase --continue) &&
            git push
          )
